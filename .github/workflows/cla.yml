name: CLA Assistant

on:
  issue_comment:
    types:
      - created
  pull_request_target:
    types:
      - opened
      - closed
      - synchronize

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, 'recheck'))
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Personal access token with repo scope, stored as an org secret.
          # Required by cla-assistant to write the CLA signatures file.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_PAT }}
        with:
          # Path in this repo where CLA signatures are stored as JSON.
          path-to-signatures: .github/cla/signatures.json
          # URL of the CLA document contributors must agree to.
          path-to-document: https://lumen.micelium.com/cla
          # Branch where the signatures file is committed.
          branch: main
          # Allowlist — bots and org members who are exempt from CLA check.
          allowlist: bot*,dependabot[bot],github-actions[bot]
